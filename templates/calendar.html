<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EECI Schedule</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>
<script>
    const savedTheme = localStorage.getItem("theme") || "light";
    document.documentElement.dataset.theme = savedTheme;
</script>

<style>

    :root {
        --page-bg: #f9f5f2;
        --surface: rgba(255, 255, 255, 0.78);
        --surface-strong: #ffffff;
        --surface-muted: rgba(255, 255, 255, 0.35);
        --calendar-header-bg: rgba(255, 255, 255, 0.72);
        --calendar-header-text: #8b7772;
        --calendar-list-bg: rgba(255, 255, 255, 0.82);
        --calendar-list-text: #35333a;
        --text: #35333a;
        --text-muted: #8b7772;
        --accent: #a35555;
        --accent-hover: #bdaba4;
        --event-bg: #c57f90;
        --event-text: #ffffff;
        --border: rgba(0, 0, 0, 0.08);
        --shadow: rgba(0, 0, 0, 0.08);
        --modal-backdrop: rgba(0, 0, 0, 0.35);
        --input-bg: #ffffff;
        --input-border: #ddd7d3;
        --danger: #d9534f;
        --notes-bg: rgba(163, 85, 85, 0.08);
        --today-bg: rgba(197, 127, 144, 0.12);
        --button-text: #ffffff;
    }

    :root[data-theme="dark"] {
        --page-bg: #151418;
        --surface: rgba(35, 34, 40, 0.88);
        --surface-strong: #242229;
        --surface-muted: rgba(255, 255, 255, 0.07);
        --calendar-header-bg: #302b31;
        --calendar-header-text: #e7d9d7;
        --calendar-list-bg: #262229;
        --calendar-list-text: #f1e7e5;
        --text: #f4eeee;
        --text-muted: #c7b9b5;
        --accent: #a76574;
        --accent-hover: #895565;
        --event-bg: #8e4f61;
        --event-text: #fff7f8;
        --border: rgba(255, 255, 255, 0.12);
        --shadow: rgba(0, 0, 0, 0.35);
        --modal-backdrop: rgba(0, 0, 0, 0.62);
        --input-bg: #17161b;
        --input-border: #4b4248;
        --danger: #e15f5b;
        --notes-bg: rgba(167, 101, 116, 0.16);
        --today-bg: rgba(167, 101, 116, 0.14);
        --button-text: #fff7f8;
    }

    * {
        box-sizing: border-box;
    }

    html {
        color-scheme: light;
    }

    html[data-theme="dark"] {
        color-scheme: dark;
    }

    html,
    body,
    #calendar,
    .modal-content,
    .fc-theme-standard td,
    .fc-theme-standard th,
    .fc-theme-standard .fc-scrollgrid,
    .fc .fc-button,
    .fc-event,
    input,
    select,
    textarea,
    button {
        transition:
            background-color 0.25s ease,
            border-color 0.25s ease,
            box-shadow 0.25s ease,
            color 0.25s ease;
    }

    body {
        margin: 0;
        padding: 30px;
        background: var(--page-bg);
        font-family: "Segoe UI", sans-serif;
        color: var(--text);
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
    }

    .header {
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
    }

    .header-text {
        flex: 1;
        text-align: center;
    }

    .header h1 {
        margin: 0;
        font-size: 2.3rem;
        font-weight: 700;
        color: var(--text);
    }

    .subtitle {
        margin-top: 8px;
        color: var(--text-muted);
        font-size: 1rem;
    }

    .schedule-alert {
        margin: 0 0 18px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent);
        border-radius: 8px;
        background: var(--surface-strong);
        color: var(--text);
        box-shadow: 0 6px 18px var(--shadow);
    }

    #themeToggle {
        min-width: 132px;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 14px;
        background: var(--surface-strong);
        color: var(--text);
        cursor: pointer;
        font-weight: 700;
        box-shadow: 0 6px 18px var(--shadow);
    }

    #themeToggle:hover {
        border-color: var(--accent);
        color: var(--accent);
    }

    #calendar {
        background: var(--surface);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 8px 30px var(--shadow);
    }

    /* Calendar toolbar */

    .fc-toolbar-title {
        color: var(--text);
        font-weight: 700;
    }

    .fc .fc-button {
        background: var(--accent) !important;
        border: none !important;
        border-radius: 12px !important;
        color: var(--button-text) !important;
        padding: 8px 14px !important;
    }

    .fc .fc-button:hover {
        background: var(--accent-hover) !important;
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active {
        background: var(--accent-hover) !important;
    }

    /* Grid */

    .fc-theme-standard td,
    .fc-theme-standard th,
    .fc-theme-standard .fc-scrollgrid {
        border-color: var(--border);
    }

    .fc-col-header-cell {
        background: var(--calendar-header-bg);
    }

    .fc .fc-daygrid-day {
        background: transparent;
        color: var(--text);
    }

    .fc .fc-list {
        background: var(--calendar-list-bg);
        color: var(--calendar-list-text);
    }

    .fc .fc-list-day-cushion {
        background: var(--calendar-header-bg);
        color: var(--calendar-header-text);
    }

    .fc .fc-list-event td {
        background: var(--event-bg);
        color: var(--event-text);
    }

    .fc .fc-daygrid-day-number,
    .fc .fc-col-header-cell-cushion {
        color: var(--calendar-header-text);
    }

    .fc .fc-list-day-cushion,
    .fc .fc-list-day-text,
    .fc .fc-list-day-side-text {
        color: var(--calendar-header-text);
    }

    .fc .fc-list-event:hover td {
        background: var(--accent-hover);
    }

    /* Events */

    .fc-event {
        background: var(--event-bg) !important;
        border: none !important;
        border-radius: 8px !important;
        color: var(--event-text) !important;
        font-weight: 600;
        padding: 2px;
    }

    .fc-event-title,
    .fc-event-time {
        color: var(--event-text);
    }

    /* Today */

    .fc-day-today {
        background: var(--today-bg) !important;
    }

    /* Footer */

    .footer {
        margin-top: 20px;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    /* Modal */

    .modal {
        display: none;
        position: fixed;
        z-index: 999;

        left: 0;
        top: 0;

        width: 100%;
        height: 100%;

        background: var(--modal-backdrop);

        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: var(--surface-strong);
        color: var(--text);

        width: 90%;
        max-width: 420px;

        padding: 25px;

        border-radius: 20px;

        box-shadow: 0 10px 40px var(--shadow);

        position: relative;
    }

    .modal-content h2 {
        margin-top: 0;
        color: var(--accent);
    }

    #closeModal,
    #closeAddModal {
        position: absolute;

        top: 15px;
        right: 20px;

        font-size: 1.6rem;
        cursor: pointer;

        color: var(--accent);
    }

    #modalType,
    #modalRoom,
    #modalTime,
    #modalNotes {
        font-size: 1rem;
        line-height: 1.6;
    }

    #modalNotes {
        background: var(--notes-bg);
        border-radius: 10px;
        padding: 10px;
    }

    #modalNotes:empty {
        display: none;
    }

    @media (max-width: 768px) {

        body {
            padding: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
        }

        .header {
            align-items: stretch;
            flex-direction: column;
        }

        .header-text {
            text-align: center;
        }

        #themeToggle {
            align-self: center;
        }

        #calendar {
            padding: 10px;
        }
    }

    #addEventBtn {
        margin-top: 15px;
        background: var(--accent);
        color: var(--button-text);
        border: none;
        padding: 10px 18px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
    }

    #addEventBtn:hover {
        opacity: 0.9;
    }

    .modal-content input,
    .modal-content select,
    .modal-content textarea {

        width: 100%;

        padding: 10px;

        margin-top: 10px;

        background: var(--input-bg);

        color: var(--text);

        border: 1px solid var(--input-border);

        border-radius: 10px;

        font-size: 0.95rem;
    }

    .modal-content textarea {
        resize: vertical;
        min-height: 96px;
        font-family: inherit;
    }

    .modal-content label {
        display: block;
        margin-top: 12px;
        color: var(--text-muted);
        font-weight: 600;
    }

    #saveEvent {

        width: 100%;

        padding: 12px;

        margin-top: 15px;

        background: var(--accent);

        color: var(--button-text);

        border: none;

        border-radius: 10px;

        cursor: pointer;

        font-weight: 600;
    }

    #saveEvent:hover {
        opacity: 0.9;
    }

    .calendar-actions {

        margin-top: 20px;

        display: flex;

        justify-content: center;
    }

    #addEventBtn {

        min-width: 180px;

        background: var(--accent);

        color: var(--button-text);

        border: none;

        padding: 12px 20px;

        border-radius: 12px;

        cursor: pointer;

        font-weight: 600;

        font-size: 1rem;
    }

    #deleteEventBtn {

        width: 100%;

        margin-top: 15px;

        padding: 12px;

        border: none;

        border-radius: 10px;

        cursor: pointer;

        background: var(--danger);

        color: #ffffff;

        font-weight: 600;
    }

    .schedule-alert,
    .footer {
        transition:
            background-color 0.25s ease,
            border-color 0.25s ease,
            box-shadow 0.25s ease,
            color 0.25s ease;
    }

</style>


</head>

<body>


<div id="eventModal" class="modal">

    <div class="modal-content">

        <span id="closeModal">&times;</span>

        <h2 id="modalTitle"></h2>

        <p id="modalType"></p>

        <p id="modalRoom"></p>

        <p id="modalTime"></p>

        <p id="modalNotes"></p>

        <button id="deleteEventBtn"
            style="display:none;">
                Delete Event
        </button>

    </div>

</div>

<div id="addModal" class="modal">

    <div class="modal-content">

        <span id="closeAddModal">&times;</span>

        <h2>Add Event</h2>

        <input
            id="eventTitle"
            placeholder="Event Title">

        <input
            id="eventDate"
            type="date">

        <input
            id="eventStart"
            type="time">

        <input
            id="eventEnd"
            type="time">
        <input
            id="eventLocation"
            placeholder="Room / Location">

        <select id="eventType">

            <option>Personal Task</option>

            <option>Extra Class</option>

            <option>Event</option>

        </select>

        <label for="eventNotes">Notes</label>
        <textarea
            id="eventNotes"
            rows="4"
            placeholder="Add notes, assignments, reminders..."
        ></textarea>

        <br><br>

        <button id="saveEvent">
            Save Event
        </button>

    </div>

</div>

<div class="container">

    <div class="header">
        <div class="header-text">
            <h1>EECI Schedule</h1>
            <p class="subtitle">
                Class schedule calendar
            </p>
        </div>

        <button
            id="themeToggle"
            type="button"
            aria-label="Switch to dark mode">
                Dark Mode
        </button>
        
    </div>

    {% if schedule_error %}
    <div class="schedule-alert">
        {{ schedule_error }}
    </div>
    {% endif %}

    <div id="calendar"></div>

<div class="calendar-actions">

    <button id="addEventBtn">
        + Add Event
    </button>

</div>

    <div class="footer">
        Student-made calendar view of the EECI schedule
    </div>

</div>

<script>

    let selectedEvent = null;

    document.addEventListener('DOMContentLoaded', function () {

        const calendarEl = document.getElementById('calendar');
        const themeToggle =
            document.getElementById("themeToggle");

        function updateThemeButton(theme) {

            const isDark = theme === "dark";

            themeToggle.innerText =
                isDark ? "Light Mode" : "Dark Mode";

            themeToggle.setAttribute(
                "aria-label",
                isDark
                    ? "Switch to light mode"
                    : "Switch to dark mode"
            );
        }

        updateThemeButton(
            document.documentElement.dataset.theme
        );

        themeToggle.onclick = function() {

            const currentTheme =
                document.documentElement.dataset.theme;

            const nextTheme =
                currentTheme === "dark" ? "light" : "dark";

            document.documentElement.dataset.theme =
                nextTheme;

            localStorage.setItem(
                "theme",
                nextTheme
            );

            updateThemeButton(nextTheme);
        };

        const eeciEvents =
        {{ events|tojson|safe }};

        const hardcodedClasses = [
    {
        title: "Electrical Circuits",
        start: "2026-07-05T09:00",
        end: "2026-07-05T18:00",
        backgroundColor: "#c57f90",
        borderColor: "#c57f90",
        type: "Class",
        room: "EECI",
        timing: "09:00 - 18:00",
        notes: " "
    }
 
];

        const customEvents =
        JSON.parse(
            localStorage.getItem("customEvents")
        ) || [];

        const allEvents = [
            ...eeciEvents,
            ...hardcodedClasses,
            ...customEvents
        ];

        const calendar = new FullCalendar.Calendar(calendarEl, {
            displayEventTime: false,
            
            initialView: 'dayGridMonth',

            firstDay: 1,

            eventDidMount: function(info) {

                if (info.event.extendedProps.notes) {

                    info.el.title =
                        "📝 " + info.event.extendedProps.notes;
                }
            },

            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listWeek'
            },

            buttonText: {
                today: 'Today',
                month: 'Month',
                week: 'Week'
            },

            height: 'auto',

            events: allEvents,

            eventClick: function(info) {

                selectedEvent = info.event;

                if (info.event.extendedProps.isCustom) {

                    document.getElementById("deleteEventBtn")
                        .style.display = "block";

                }
                else {

                    document.getElementById("deleteEventBtn")
                        .style.display = "none";
                }

                document.getElementById("modalTitle").innerText =
                    info.event.title;

                const type =
                    info.event.extendedProps.type;

                const room =
                    info.event.extendedProps.room;

                if (type) {

                    document.getElementById("modalType")
                        .innerText = "🏷 Type: " + type;

                }
                else {

                    document.getElementById("modalType")
                        .innerText = "";
                }

                if (room) {

                    document.getElementById("modalRoom")
                        .innerText = "📍 Location: " + room;

                }
                else {

                    document.getElementById("modalRoom")
                        .innerText = "";
                }


                document.getElementById("modalTime").innerText =
                    "🕒 Time: " + info.event.extendedProps.timing;
                
                const notes =
                    info.event.extendedProps.notes;

                if (notes) {

                    document.getElementById("modalNotes")
                        .innerText = "📝 Notes: " + notes;

                }
                else {

                    document.getElementById("modalNotes")
                        .innerText = "";

                }

                document.getElementById("eventModal").style.display =
                    "flex";
            }

        });

        calendar.render();

        document.getElementById("addEventBtn")
        .onclick = function() {

            document.getElementById("addModal")
                .style.display = "flex";
        };

        document.getElementById("closeAddModal")
        .onclick = function() {

            document.getElementById("addModal")
                .style.display = "none";
        };

        document.getElementById("saveEvent")
        .onclick = function() {

            const title =
                document.getElementById("eventTitle").value;

            const date =
                document.getElementById("eventDate").value;

            const start =
                document.getElementById("eventStart").value;

            const end =
                document.getElementById("eventEnd").value;

            const type =
                document.getElementById("eventType").value;

            const location =
                document.getElementById("eventLocation").value;

            const notes =
                document.getElementById("eventNotes").value;

            let color;

if (type === "Extra Class") {
    color = "#c57f90";
}
else if (type === "Personal Task") {
    color = "#6f9ceb";
}
else {
    color = "#9b7ad6";
}

const event = {

    title: title,

    start: `${date}T${start}`,

    end: `${date}T${end}`,

    backgroundColor: color,

    borderColor: color,

    type: type,

    room: location,

    notes: notes,

    timing: `${start} - ${end}`,

    isCustom: true
};
            customEvents.push(event);

            localStorage.setItem(
                "customEvents",
                JSON.stringify(customEvents)
            );

            calendar.addEvent(event);

            document.getElementById("eventTitle").value = "";
            document.getElementById("eventDate").value = "";
            document.getElementById("eventStart").value = "";
            document.getElementById("eventEnd").value = "";
            document.getElementById("eventLocation").value = "";
            document.getElementById("eventType").selectedIndex = 0;
            document.getElementById("eventNotes").value = "";

            document.getElementById("addModal")
    .style.display = "none";

        };

        document.getElementById("closeModal").onclick = function() {

            document.getElementById("eventModal").style.display =
                "none";
        };

        document.getElementById("deleteEventBtn")
.onclick = function() {

    if (!selectedEvent) return;

    const updatedEvents =
        customEvents.filter(event => {

            return !(
                event.title === selectedEvent.title &&
                selectedEvent.startStr.startsWith(event.start)
            );

        });

    localStorage.setItem(
        "customEvents",
        JSON.stringify(updatedEvents)
    );

    selectedEvent.remove();

    document.getElementById("eventModal")
        .style.display = "none";
};

        window.onclick = function(event) {

            const modal = document.getElementById("eventModal");

            if (event.target === modal) {
                modal.style.display = "none";
            }
        };

    });

</script>


</body>

</html>
