<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EECI Schedule</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>

<style>

    :root {
        --vanilla: #f9f5f2;
        --blush: #35333a;
        --rosewood: #bdaba4;
        --sage: #35333a;
        --misty: #c57f90;
        --midnight: #a35555;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 30px;
        background: var(--vanilla);
        font-family: "Segoe UI", sans-serif;
        color: var(--sage);
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
    }

    .header {
        text-align: center;
        margin-bottom: 30px;
    }

    .header h1 {
        margin: 0;
        font-size: 2.3rem;
        font-weight: 700;
        color: var(--sage);
    }

    .subtitle {
        margin-top: 8px;
        color: var(--rosewood);
        font-size: 1rem;
    }

    #calendar {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    /* Calendar toolbar */

    .fc-toolbar-title {
        color: var(--sage);
        font-weight: 700;
    }

    .fc .fc-button {
        background: var(--midnight) !important;
        border: none !important;
        border-radius: 12px !important;
        padding: 8px 14px !important;
    }

    .fc .fc-button:hover {
        background: var(--rosewood) !important;
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active {
        background: var(--rosewood) !important;
    }

    /* Grid */

    .fc-theme-standard td,
    .fc-theme-standard th,
    .fc-theme-standard .fc-scrollgrid {
        border-color: rgba(0, 0, 0, 0.08);
    }

    .fc-col-header-cell {
        background: rgba(255, 255, 255, 0.3);
    }

    /* Events */

    .fc-event {
        background: var(--misty) !important;
        border: none !important;
        border-radius: 8px !important;
        color: white !important;
        font-weight: 600;
        padding: 2px;
    }

    /* Today */

    .fc-day-today {
        background: rgba(197, 127, 144, 0.12) !important;
    }

    /* Footer */

    .footer {
        margin-top: 20px;
        text-align: center;
        color: var(--rosewood);
        font-size: 0.9rem;
    }

    /* Modal */

    .modal {
        display: none;
        position: fixed;
        z-index: 999;

        left: 0;
        top: 0;

        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.35);

        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: white;

        width: 90%;
        max-width: 420px;

        padding: 25px;

        border-radius: 20px;

        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);

        position: relative;
    }

    .modal-content h2 {
        margin-top: 0;
        color: var(--midnight);
    }

    #closeModal {
        position: absolute;

        top: 15px;
        right: 20px;

        font-size: 1.6rem;
        cursor: pointer;

        color: var(--midnight);
    }

    #modalRoom,
    #modalTime {
        font-size: 1rem;
        line-height: 1.6;
    }

    @media (max-width: 768px) {

        body {
            padding: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
        }

        #calendar {
            padding: 10px;
        }
    }

</style>


</head>

<body>


<div id="eventModal" class="modal">

    <div class="modal-content">

        <span id="closeModal">&times;</span>

        <h2 id="modalTitle"></h2>

        <p id="modalRoom"></p>

        <p id="modalTime"></p>

    </div>

</div>

<div class="container">

    <div class="header">
        <h1>EECI Schedule</h1>
        <p class="subtitle">
            Class schedule calendar
        </p>
    </div>

    <div id="calendar"></div>

    <div class="footer">
        Student-made calendar view of the EECI schedule
    </div>

</div>

<script>

    document.addEventListener('DOMContentLoaded', function () {

        const calendarEl = document.getElementById('calendar');

        const calendar = new FullCalendar.Calendar(calendarEl, {

            initialView: 'dayGridMonth',

            firstDay: 1,

            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listWeek'
            },

            buttonText: {
                today: 'Today',
                month: 'Month',
                week: 'Week'
            },

            height: 'auto',

            events: {{ events|tojson|safe }},

            eventClick: function(info) {

                document.getElementById("modalTitle").innerText =
                    info.event.title;

                document.getElementById("modalRoom").innerText =
                    "📍 Room: " + info.event.extendedProps.room;

                document.getElementById("modalTime").innerText =
                    "🕒 Time: " + info.event.extendedProps.timing;

                document.getElementById("eventModal").style.display =
                    "flex";
            }

        });

        calendar.render();

        document.getElementById("closeModal").onclick = function() {

            document.getElementById("eventModal").style.display =
                "none";
        };

        window.onclick = function(event) {

            const modal = document.getElementById("eventModal");

            if (event.target === modal) {
                modal.style.display = "none";
            }
        };

    });

</script>


</body>

</html>
